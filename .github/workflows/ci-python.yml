name: CI (Python)

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash
    working-directory: python

permissions:
  contents: read

jobs:
  style:
    name: Style
    runs-on: ubuntu-latest
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - &setup-python
        name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install ruff black
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --target-version py310 --check --diff .
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Rustfmt
        run: cargo fmt --all --check

  tests:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - *checkout
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install locally
        run: pip install -e ".[tests]"
      - name: Install dependencies
        run: pip install pytest-md-report
      - name: Pytest
        run: pytest --md-report --md-report-flavor gfm --md-report-output $GITHUB_STEP_SUMMARY

  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            manylinux: auto
          - os: ubuntu-24.04-arm
            manylinux: auto
          - os: windows-latest
          - os: macos-latest
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - *checkout
      - *setup-python
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          args: --release --out dist --interpreter 3.10
          sccache: true
          manylinux: ${{ matrix.manylinux }}
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: python/dist
      - name: Install wheels
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)
          if (( ${#wheels[@]} != 1 )); then
            echo "expected exactly one wheel, got: ${wheels[*]:-none}" >&2
            exit 1
          fi
          pip install "${wheels[0]}[tests]" --force-reinstall
      - name: Pytest
        run: pytest --import-mode importlib

  sdist:
    name: Source distribution
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: python/dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && github.repository_owner == 'ModelTC'
    needs: [style, tests, build, sdist]
    permissions:
      id-token: write
      contents: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: "dist/*"
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Upload to GitHub Release
        if: "!contains(github.ref, 'dev')"
        uses: softprops/action-gh-release@v3
        with:
          working_directory: dist
          files: |
            *.whl
            *.tar.gz
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          fail_on_unmatched_files: true
