name: Build & Test the Python Bindings
on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  format:
    name: Check Python format
    runs-on: ubuntu-latest
    defaults: &run-in-python
      run:
        shell: bash
        working-directory: python
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install ruff black
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check --diff .
  rustfmt:
    name: Check Rust format
    runs-on: ubuntu-latest
    defaults: *run-in-python
    steps:
      - *checkout
      - run: rustup update nightly && rustup default nightly
      - run: rustup component add rustfmt
      - run: cargo fmt --all --check
  tests:
    name: Run tests
    runs-on: ubuntu-latest
    defaults: *run-in-python
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - *checkout
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install locally
        run: pip install -e ".[tests]"
      - name: Install additional dependencies
        run: pip install pytest-md pytest-emoji
      - uses: pavelzw/pytest-action@v2
        with:
          emoji: false
          verbose: true
          job-summary: true
      - name: Test building wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          sccache: true
          manylinux: auto
  linux:
    strategy:
      matrix:
        target:
          - arch: x86_64
            os: ubuntu-latest
          - arch: aarch64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.target.os }}
    defaults: *run-in-python
    steps:
      - *checkout
      - &setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          args: --release --out dist --interpreter 3.10
          sccache: true
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target.arch }}
          path: python/dist
      - &pytest
        name: Run pytest
        run: |
          set -e
          WHEEL="$(find dist -maxdepth 1 -type f -name 'mtc_token_healing-*.whl' -print -quit)"
          pip install "$WHEEL"[tests] --force-reinstall
          pytest --import-mode=importlib
  windows:
    strategy:
      matrix:
        target:
          - arch: x86_64
            os: windows-latest
    runs-on: ${{ matrix.target.os }}
    defaults: *run-in-python
    steps:
      - *checkout
      - *setup-python
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          args: --release --out dist --interpreter 3.10
          sccache: true
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.target.arch }}
          path: python/dist
      - *pytest
  macos:
    strategy:
      matrix:
        target:
          - arch: aarch64
            os: macos-latest
    runs-on: ${{ matrix.target.os }}
    defaults: *run-in-python
    steps:
      - *checkout
      - *setup-python
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          args: --release --out dist --interpreter 3.10
          sccache: true
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target.arch }}
          path: python/dist
      - *pytest
  sdist:
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: python/dist
  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') && github.repository_owner == 'ModelTC' }}
    needs: [tests, format, rustfmt, linux, windows, macos, sdist]
    permissions:
      id-token: write
      contents: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: "dist/*"
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Upload to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'dev') }}
        uses: softprops/action-gh-release@v3
        with:
          working_directory: dist
          files: |
            *.whl
            *.tar.gz
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
